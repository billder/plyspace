<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — ply.space</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body data-page="success">

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-name">ply.<span>space</span></a>
    </div>
  </header>

  <main class="success-outer">
    <div class="success-card">
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Order confirmed.</h1>
      <p>Thank you for your purchase. Your zines are on their way — check your email for a receipt.</p>
      <a href="/" class="btn-checkout" style="display:inline-block;width:auto;padding:14px 32px;margin-top:8px">Back to shop</a>
    </div>
  </main>

  <script src="/js/cart-store.js"></script>
  <script src="/js/tracker.js"></script>
  <script>
    // Clear the cart on successful purchase
    CartStore.clear();
    track('purchase_complete', 'success');

    // Record the order — Stripe appends ?payment_intent=pi_xxx to the return URL
    const piId = new URLSearchParams(window.location.search).get('payment_intent');
    if (piId) {
      fetch('/api/orders/record', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ payment_intent_id: piId }),
      }).catch(() => {});
    }
  </script>
</body>
</html>
