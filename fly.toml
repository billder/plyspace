# fly.toml app configuration file generated for plyspace-black-dust-8362 on 2026-03-26T11:00:01-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'plyspace-black-dust-8362'
primary_region = 'lax'

[build]

[env]
  DATA_DIR = '/data'

[mounts]
  source = 'plyspace_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
