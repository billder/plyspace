<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ply.space</title>
  <meta name="description" content="Thinking big. Thinking small. ply.space from Bill DeRouchey.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-name">ply.<span>space</span></a>
      <nav class="header-nav">
        <a href="/cart.html" class="cart-btn" id="cart-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          Cart
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="page-hero">
    <h1>Read this <span style="color:var(--accent)">on paper</span>.</h1>
    <p>Thinking big, thinking small.<br>Words and photos from Bill DeRouchey.</p>
  </section>

  <!-- Products -->
  <main class="products-section">
    <div class="products-grid" id="products-grid">
      <!-- Skeleton cards while loading -->
      <div class="product-card" style="pointer-events:none" aria-hidden="true">
        <div class="card-image skeleton" style="aspect-ratio:3/4"></div>
        <div class="card-body">
          <div class="skeleton" style="height:18px;width:70%;border-radius:4px"></div>
          <div class="skeleton" style="height:13px;width:90%;border-radius:4px;margin-top:6px"></div>
          <div class="card-footer">
            <div class="skeleton" style="height:20px;width:50px;border-radius:4px"></div>
            <div class="skeleton" style="height:34px;width:90px;border-radius:6px"></div>
          </div>
        </div>
      </div>
      <div class="product-card" style="pointer-events:none" aria-hidden="true">
        <div class="card-image skeleton" style="aspect-ratio:3/4"></div>
        <div class="card-body">
          <div class="skeleton" style="height:18px;width:60%;border-radius:4px"></div>
          <div class="skeleton" style="height:13px;width:80%;border-radius:4px;margin-top:6px"></div>
          <div class="card-footer">
            <div class="skeleton" style="height:20px;width:50px;border-radius:4px"></div>
            <div class="skeleton" style="height:34px;width:90px;border-radius:6px"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; <span id="year"></span> ply.space &mdash; All orders shipped with care.</p>
  </footer>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/cart-store.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
