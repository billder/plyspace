<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — ply.space</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body data-page="checkout">

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-name">ply.<span>space</span></a>
      <nav class="header-nav">
        <a href="/cart.html" class="nav-link">← Back to cart</a>
      </nav>
    </div>
  </header>

  <main class="checkout-outer">
    <div class="checkout-layout">

      <!-- Left: order summary -->
      <div class="checkout-summary">
        <h2 class="co-section-title">Your Order</h2>
        <div id="order-items" class="co-items"></div>
        <div class="co-totals">
          <div class="co-row"><span>Subtotal</span><span id="co-subtotal">—</span></div>
          <div class="co-row"><span>Shipping</span><span id="co-shipping">—</span></div>
          <div class="co-row"><span>Tax</span><span id="co-tax">—</span></div>
          <div class="co-row co-total"><span>Total</span><span id="co-total">—</span></div>
        </div>
      </div>

      <!-- Right: payment form -->
      <div class="checkout-payment">
        <h2 class="co-section-title">Shipping &amp; Payment</h2>
        <div id="co-loading" class="co-loading">Loading secure checkout…</div>
        <div id="co-init-error" class="checkout-error" style="display:none"></div>

        <form id="payment-form" style="display:none">

          <!-- Shipping destination -->
          <div class="co-field-label">Where are we shipping?</div>
          <div class="co-radio-group">
            <label class="co-radio">
              <input type="radio" name="shipping" value="us" checked>
              <span>Within the US <em>— $2 per zine</em></span>
            </label>
            <label class="co-radio">
              <input type="radio" name="shipping" value="intl">
              <span>International <em>— $3 per zine</em></span>
            </label>
          </div>

          <!-- Shipping address fields -->
          <div class="co-field-label" style="margin-top:20px">Shipping address</div>
          <div class="co-address-fields">
            <div class="form-group">
              <input type="text" id="ship-name"    placeholder="Full name"        autocomplete="name"            required>
            </div>
            <div class="form-group">
              <input type="text" id="ship-line1"   placeholder="Address"          autocomplete="address-line1"   required>
            </div>
            <div class="form-group">
              <input type="text" id="ship-line2"   placeholder="Apt, suite, etc. (optional)" autocomplete="address-line2">
            </div>
            <div class="co-address-row">
              <div class="form-group">
                <input type="text" id="ship-city"  placeholder="City"             autocomplete="address-level2"  required>
              </div>
              <div class="form-group">
                <input type="text" id="ship-state" placeholder="State / Province" autocomplete="address-level1">
              </div>
              <div class="form-group">
                <input type="text" id="ship-zip"   placeholder="ZIP / Postal"     autocomplete="postal-code"     required>
              </div>
            </div>
            <div class="form-group">
              <input type="text" id="ship-country" placeholder="Country (e.g. US, GB, CA)" autocomplete="country" required>
            </div>
          </div>

          <!-- Same-address checkbox -->
          <label class="co-same-address" style="margin-top:20px">
            <input type="checkbox" id="same-address" checked>
            <span>Billing address is the same as shipping</span>
          </label>

          <!-- Billing address fields (hidden by default) -->
          <div id="billing-section" style="display:none">
            <div class="co-field-label" style="margin-top:20px">Billing address</div>
            <div class="co-address-fields">
              <div class="form-group">
                <input type="text" id="bill-name"    placeholder="Full name"        autocomplete="billing name">
              </div>
              <div class="form-group">
                <input type="text" id="bill-line1"   placeholder="Address"          autocomplete="billing address-line1">
              </div>
              <div class="form-group">
                <input type="text" id="bill-line2"   placeholder="Apt, suite, etc. (optional)" autocomplete="billing address-line2">
              </div>
              <div class="co-address-row">
                <div class="form-group">
                  <input type="text" id="bill-city"  placeholder="City"             autocomplete="billing address-level2">
                </div>
                <div class="form-group">
                  <input type="text" id="bill-state" placeholder="State / Province" autocomplete="billing address-level1">
                </div>
                <div class="form-group">
                  <input type="text" id="bill-zip"   placeholder="ZIP / Postal"     autocomplete="billing postal-code">
                </div>
              </div>
              <div class="form-group">
                <input type="text" id="bill-country" placeholder="Country (e.g. US, GB, CA)" autocomplete="billing country">
              </div>
            </div>
          </div>

          <!-- Card details via Stripe -->
          <div class="co-field-label" style="margin-top:24px">Card details</div>
          <div id="payment-element"></div>

          <div id="payment-error" class="checkout-error" style="display:none;margin-top:12px"></div>

          <button type="submit" id="pay-btn" class="btn-checkout" style="margin-top:24px">
            Pay <span id="pay-amount">—</span>
          </button>
          <p class="co-secure-note">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secured by Stripe
          </p>
        </form>
      </div>

    </div>
  </main>

  <script src="/js/cart-store.js"></script>
  <script src="/js/tracker.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
